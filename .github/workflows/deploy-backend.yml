name: Deploy Backend to Azure

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure App Service is running
        run: |
          RG=$(az webapp show --name halalcart-api --query resourceGroup -o tsv)
          echo "Resource group: $RG"
          az webapp start --name halalcart-api --resource-group "$RG" || true

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env"

      - name: Deploy to Azure Web App
        run: |
          RG=$(az webapp show --name halalcart-api --query resourceGroup -o tsv)
          az webapp deploy \
            --name halalcart-api \
            --resource-group "$RG" \
            --src-path backend-deploy.zip \
            --type zip \
            --async false
          az webapp config set \
            --name halalcart-api \
            --resource-group "$RG" \
            --startup-file 'gunicorn --bind=0.0.0.0:8000 --timeout 120 --workers 2 run:app'

      - name: Warm up backend
        run: |
          echo "Waiting for app to start..."
          sleep 30
          curl -sf https://halalcart-api.azurewebsites.net/api/health || true
          echo "Backend warmed up."
